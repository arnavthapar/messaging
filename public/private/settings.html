<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate"/>
    <meta name="author" content="me">
    <meta name="description" content="Settings page">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <noscript>You need to enable Javasript for this website to work. Who has that turned off?</noscript>
    <!--<link rel="icon" type="image/x-icon" href="images/favicon.ico">!-->
    <title>home</title>
</head>
<body>
    <div class="box">
        <h1>Welcome, <span id="username"></span>!</h1>
    </div>
    <div class="container">
        <div class="bg-box content flex-column fit-content homeContent">
            <div>
                <button id="backButton" class="marginBrem" title="Back">Back</button>
                <form id="usernameForm">
                    <input type="text" id="usernameInput" autocomplete="off" placeholder="Type a new username...">
                    <button type="submit" value="send">Change</button>
                </form>
                <p id="status"></p>
                <p>Delete Account</p>
                <form id="deleteForm">
                    <input type="text" id="deleteUsernameInput" autocomplete="off" placeholder="Type your username to confirm.">
                    <button type="submit">Delete Account</button>
                </form>
                <p id="deleteStatus"></p>
                <button id="timeFormat" class="marginBrem">Change Date Format (mm/dd/yyyy <-> dd/mm/yyyy)</button>
                <br>
                <button id="24hour">Change Time Format (12 hour <-> 24 hour)</button>
            </div>
        </div>
    </div>
</body>
</html>
<script src="settings.js"></script>
